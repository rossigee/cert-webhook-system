name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: harbor.golder.lan/library
  IMAGE_NAME: cert-webhook-system
  GO_VERSION: "1.26.3"

jobs:
  release-build:
    name: Build Release Assets
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            platform: linux/amd64
          - goos: linux
            goarch: arm64
            platform: linux/arm64
          - goos: darwin
            goarch: amd64
            platform: darwin/amd64
          - goos: darwin
            goarch: arm64
            platform: darwin/arm64
          - goos: windows
            goarch: amd64
            platform: windows/amd64
            ext: .exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

    - name: Build binaries
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
        VERSION: ${{ github.ref_name }}
      run: |
        mkdir -p dist
        # Build controller
        go build -ldflags="-s -w -X main.version=${VERSION}" \
          -o dist/controller-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
          ./cmd/controller
        # Build webhook
        go build -ldflags="-s -w -X main.version=${VERSION}" \
          -o dist/webhook-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
          ./cmd/webhook

    - name: Create checksums
      run: |
        cd dist
        sha256sum * > checksums-${{ matrix.goos }}-${{ matrix.goarch }}.txt

    - name: Upload binaries
      uses: actions/upload-artifact@v7
      with:
        name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
        path: dist/

  docker-release-amd64:
    name: Build and Push Release Images (amd64)
    runs-on: ubuntu-latest
    needs: release-build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        tags: |
          type=semver,pattern={{version}},value=${{ github.ref_name }}
          type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
          type=semver,pattern={{major}},value=${{ github.ref_name }}
          type=raw,value=latest
        labels: |
          org.opencontainers.image.version=${{ github.ref_name }}
          org.opencontainers.image.revision=${{ github.sha }}

    - name: Build and push Docker images
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VERSION=${{ github.ref_name }}
          BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}

    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
        format: spdx-json
        output-file: sbom-${{ github.ref_name }}.spdx.json

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v7
      with:
        name: sbom-release-amd64
        path: sbom-${{ github.ref_name }}.spdx.json

  docker-release-arm64:
    name: Build and Push Release Images (arm64)
    runs-on: ubuntu-latest-arm
    needs: release-build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        tags: |
          type=semver,pattern={{version}},value=${{ github.ref_name }}
          type=semver,pattern={{major}}.{{minor}},value=${{ github.ref_name }}
          type=semver,pattern={{major}},value=${{ github.ref_name }}
        labels: |
          org.opencontainers.image.version=${{ github.ref_name }}
          org.opencontainers.image.revision=${{ github.sha }}

    - name: Build and push Docker images
      uses: docker/build-push-action@v7
      with:
        context: .
        platforms: linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VERSION=${{ github.ref_name }}
          BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}

    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
        format: spdx-json
        output-file: sbom-${{ github.ref_name }}.spdx.json

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v7
      with:
        name: sbom-release-arm64
        path: sbom-${{ github.ref_name }}.spdx.json

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-build, docker-release-amd64, docker-release-arm64]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts/

    - name: Prepare release assets
      run: |
        mkdir -p release-assets
        find artifacts/ -name "controller-*" -o -name "webhook-*" -o -name "checksums-*" | \
          xargs -I {} cp {} release-assets/
        # Create combined checksums
        cd release-assets
        sha256sum controller-* webhook-* > checksums.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        generate_release_notes: true
        files: |
          release-assets/*
          artifacts/sbom-release-amd64/sbom-${{ github.ref_name }}.spdx.json
          artifacts/sbom-release-arm64/sbom-${{ github.ref_name }}.spdx.json
        draft: false
        prerelease: false
        make_latest: true

  update-deployment:
    name: Update Deployment Manifests
    runs-on: ubuntu-latest
    needs: [docker-release-amd64, docker-release-arm64]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Update Kubernetes manifests
      run: |
        # Update image tags in deployment manifests
        sed -i "s|image: .*${{ env.IMAGE_NAME }}:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}|g" \
          deploy/kubernetes/*.yaml

    - name: Commit manifest updates
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add deploy/kubernetes/*.yaml
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "chore: update deployment manifests to ${{ github.ref_name }}"
          git push
        fi

  notify-deployment:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: update-deployment
    
    steps:
    - name: Notify Slack
      if: success()
      uses: 8398a7/action-slack@v3
      with:
        status: success
        text: "🚀 Released ${{ env.IMAGE_NAME }} ${{ github.ref_name }}"
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

    - name: Notify on failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        text: "❌ Failed to release ${{ env.IMAGE_NAME }} ${{ github.ref_name }}"
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}